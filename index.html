<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jinho Baek</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #147314;
      --font-main: 'Space Grotesk', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background-color: var(--bg);
      font-family: var(--font-main);
      color: rgba(255,255,255,0.75);
      min-height: 100vh;
    }

    a { color: rgba(255,255,255,0.75); text-decoration: none; }
    a:hover { opacity: 0.7; }

    hr { background: rgba(255,255,255,0.85); border: 0; height: 1px; display: block; margin: 0.5rem 0 0.75rem; }

    h1 {
      font-weight: 800;
      font-size: clamp(3.5rem, 10vw, 4.5rem);
      line-height: 0.775;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.043em;
    }

    h2 {
      font-weight: 650;
      color: rgba(255,255,255,0.8);
      font-size: 1.65rem;
      line-height: 1.15;
      letter-spacing: -0.003em;
    }

    .caption {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      font-family: var(--font-mono);
      line-height: 1.15;
    }

    .col2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%; }
    .col3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; width: 100%; }
    .col-prj { display: grid; grid-template-columns: 2fr 8fr 2fr; gap: 0.5rem; width: 100%; }
    .col-info { display: grid; grid-template-columns: 4fr 8fr; gap: 2rem; width: 100%; }

    .tl { text-align: left; }
    .tr { text-align: right; }
    .tc { text-align: center; }

    /* NAV */
    #nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100; padding: 0.75rem;
      font-size: 1.1rem; font-weight: 650;
    }

    /* HEAD-ST */
    #headst { text-align: center; padding: 0.75rem; font-size: 1.1rem; font-weight: 650; }

    /* HEAD */
    #head {
      text-align: center; padding-top: 8rem; padding-bottom: 5rem;
      padding-right: 2.5rem; display: flex; justify-content: center;
      width: 100%; padding-left: 0.75rem;
    }
    #head .inner { max-width: 85%; width: 100%; }

    /* PRJ */
    #prj { padding: 0.75rem; width: 100%; font-size: 1.1rem; font-weight: 650; }
    .prj-entry { margin-bottom: 4rem; }

    .slideshow { position: relative; width: 100%; overflow: hidden; margin: 0.75rem 0; }
    .slideshow-inner { display: flex; transition: transform 0.35s ease; }
    .slide {
      min-width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slide-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      display: flex; justify-content: space-between;
      width: 100%; padding: 0 15px; pointer-events: none;
    }
    .slide-btn {
      pointer-events: all;
      background: rgba(168,168,168,0.6); border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer;
      color: rgba(0,0,0,0.9); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    .slide-btn:hover { opacity: 0.7; }
    .slide-caption { text-align: right; padding: 0.4rem 0; }

    /* INFO */
    #info {
      min-height: 100vh; display: flex; align-items: flex-start;
      padding: 4.5rem 0.75rem 7rem;
      font-size: 1.1rem; font-weight: 650;
    }
    #info .inner { width: 100%; }

    .portrait {
      width: 100%; aspect-ratio: 3/4;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.2); font-size: 0.7rem; font-family: var(--font-mono);
      overflow: hidden;
    }
    .portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* FOOT-SQ */
    #footsq { padding: 0.75rem; width: 100%; font-size: 1.1rem; font-weight: 650; }

    /* FOOT */
    #foot { padding: 0.75rem; width: 100%; font-size: 1.1rem; font-weight: 650; }
    .digital-clock { font-family: var(--font-mono); }

    /* OVERLAY */
    #overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2rem);
      align-items: flex-end; justify-content: flex-end;
    }
    #overlay.active { display: flex; }
    #overlay-panel {
      width: 33.33%; min-height: 100vh;
      background: #111; border-left: 0.05rem solid rgba(255,255,255,0.15);
      padding: 0.75rem; overflow-y: auto;
      font-size: 1.1rem; font-weight: 650;
    }

    .gallery-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .grid-item {
      aspect-ratio: 1; background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.15); font-size: 0.6rem; font-family: var(--font-mono);
      overflow: hidden;
    }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .grid-item.wide { grid-column: span 2; }

    /* SNS */
    .social-links { display: inline-flex; align-items: center; gap: 0.9rem; }
    .social-icon { display: inline-flex; opacity: 0.75; transition: opacity 0.15s; }
    .social-icon:hover { opacity: 1; }
    .social-icon svg { fill: rgba(255,255,255,0.85); display: block; }

    @media (max-width: 768px) {
      .col-prj, .col-info, .col3 { grid-template-columns: 1fr; }
      #overlay-panel { width: 100%; }
      .gallery-grid { grid-template-columns: repeat(2,1fr); }
      #head { padding-right: 0.75rem; }
    }
  </style>
</head>
<body>

<script>
/* ================================================================
   ★ 여기만 수정하면 됩니다 ★
   ================================================================ */

const SITE = {
  name:     "Jinho Baek",          /* 사이트 제목 (NAV 좌측) */
  subtitle: "Los Angeles — CA / Illustrator & Motion Designer",  /* NAV 가운데 */
  heading:  "Portfolio",           /* 메인 큰 제목 */

const INFO = {

Illustrator & Motion Designer.
여기에 자기소개를 입력하세요.`,

    "Client B",

  services: [

/* ----------------------------------------------------------------
   프로젝트 목록
   ----------------------------------------------------------------

   overlayImages 배열: 오른쪽 패널에 표시할 이미지 경로들 (없으면 images 사용)

   이미지 경로 예시:
     "images/project1-1.jpg"   ← 내 폴더에 넣은 경우
     "https://..."             ← 외부 URL

   프로젝트 추가: { } 블록을 복사해서 아래에 붙여넣으면 됩니다.
   ---------------------------------------------------------------- */

const PROJECTS = [
  {
    year:  "2025",
    title: "첫 번째 프로젝트",

    /* 슬라이드쇼 이미지 — 없으면 빈 회색 박스로 표시 */

      "images/project1-1.png",
      "images/project1-2.png",
    ],

    /* 오버레이(More 클릭 시) 상세 이미지 — 없으면 슬라이드 이미지 재사용 */
    overlayImages: [],

    /* 오버레이 상세 정보 */
    details:  "A2 사이즈, 에디션 100부, 2025",
    overview: "작업 설명을 여기에 입력하세요. 이 프로젝트는 어떤 배경에서 시작됐는지, 어떤 과정을 거쳤는지 자유롭게 적으면 됩니다.",
  },

  /* 프로젝트 추가 예시 — 주석 해제하고 내용 입력
  {
    year:  "2024",
    title: "두 번째 프로젝트",
    type:  "Motion",
    images: ["images/project2-1.jpg"],
    overlayImages: [],
    details:  "60초 애니메이션, 2024",
    overview: "설명...",
  },
  */
];

/* ================================================================
   ★ 여기 아래는 건드리지 않아도 됩니다 ★
   ================================================================ */
</script>

<!-- NAV -->
<nav id="nav">
  <div class="col2" style="align-items:center;">

      <a href="#" onclick="scrollTo({top:0,behavior:'smooth'});return false;">■ &nbsp;<span id="nav-name"></span></a>

  </div>
</nav>

<!-- HEAD-ST -->
<section id="headst"><span id="headst-text"></span></section>

<!-- HEAD -->
<section id="head">
  <div class="inner">
    <h1 id="head-title"></h1>
  </div>
</section>

<!-- PRJ -->
<section id="prj">
  <div id="prj-list"></div>
</section>

<!-- INFO -->
<section id="info">
  <div class="inner">
    <div class="col-info" style="margin-bottom:2rem;">
      <div><div class="portrait" id="portrait-wrap"></div></div>
      <div><h2 id="info-bio"></h2></div>
    </div>
    <div style="margin-bottom:1rem;">
      <div class="col2"><div class="tl">■</div><div class="tr">■</div></div>
    </div>
    <div class="col3" style="gap:2rem;">
      <div id="info-contact"></div>
      <div id="info-clients"></div>
      <div id="info-services"></div>
    </div>
  </div>
</section>

<!-- FOOT-SQ -->
<section id="footsq">
  <div class="col2"><div class="tl">■</div><div class="tr">■</div></div>
</section>

<!-- FOOT -->
<footer id="foot">
  <div class="col2" style="grid-template-columns:1fr auto 1fr;gap:0.5rem;">
    <div class="tl">&nbsp;&nbsp;&nbsp;<span class="digital-clock" id="clock"></span>&nbsp;</div>
    <div class="tc">© <span id="foot-year"></span></div>
    <div class="tr"><span id="foot-name"></span>&nbsp;&nbsp;&nbsp;</div>
  </div>
</footer>

<!-- OVERLAY -->
<div id="overlay" onclick="handleOverlayClick(event)">
  <div id="overlay-panel">
    <div class="col2" style="margin-bottom:1rem;">
      <div class="tl">■ &nbsp;<span id="ov-title"></span></div>
      <div class="tr"><a href="#" onclick="closeOverlay();return false;">✕</a></div>
    </div>
    <div class="gallery-grid" id="ov-grid" style="margin-bottom:1rem;"></div>
    <div class="col2" style="gap:1rem;">
      <div><hr>Details<br><br><span id="ov-details"></span></div>
      <div><hr>Overview<br><br><span id="ov-overview"></span></div>
    </div>
  </div>
</div>

<script>
/* --- 데이터 렌더링 --- */

// NAV
document.getElementById('nav-name').textContent = SITE.name;
document.getElementById('nav-subtitle').textContent = SITE.subtitle;
document.getElementById('nav-ig').href = `https://www.instagram.com/${SITE.instagram}`;
document.getElementById('nav-li').href = `https://www.linkedin.com/in/${SITE.linkedin}`;

// HEAD
document.getElementById('headst-text').textContent = SITE.subtitle;
document.getElementById('head-title').textContent = SITE.heading;
document.title = SITE.name;

// FOOTER
document.getElementById('foot-year').textContent = SITE.year;
document.getElementById('foot-name').textContent = SITE.name;

// INFO — 프로필 이미지
const portraitWrap = document.getElementById('portrait-wrap');
if (INFO.portrait) {
  portraitWrap.innerHTML = `<img src="${INFO.portrait}" alt="portrait">`;
} else {
  portraitWrap.textContent = '[ portrait ]';
}

// INFO — 바이오
document.getElementById('info-bio').innerHTML = INFO.bio.replace(/\n/g, '<br>');

// INFO — Contact
document.getElementById('info-contact').innerHTML = `
  Contact<br><br>
  ${INFO.contact.address.replace(/\n/g,'<br>')}<br><br>
  <a href="mailto:${INFO.contact.email}">${INFO.contact.email}</a><br><br>
  <span class="social-links">
    <a href="https://www.instagram.com/${SITE.instagram}" target="_blank" rel="noopener" class="social-icon" aria-label="Instagram">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" fill="rgba(255,255,255,0.85)"/></svg>
    </a>
    <a href="https://www.linkedin.com/in/${SITE.linkedin}" target="_blank" rel="noopener" class="social-icon" aria-label="LinkedIn">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="rgba(255,255,255,0.85)"/></svg>
    </a>
  </span>
`;

// INFO — Clients / Services
document.getElementById('info-clients').innerHTML =
  'Selected Clients<br><br>' + INFO.clients.map(c => `&nbsp;&nbsp;&nbsp;&nbsp;${c}`).join('<br>');
document.getElementById('info-services').innerHTML =
  'Services<br><br>' + INFO.services.map(s => `&nbsp;&nbsp;&nbsp;&nbsp;${s}`).join('<br>');

// PRJ — 슬라이드쇼 생성
const prjList = document.getElementById('prj-list');
const slideState = {};

PROJECTS.forEach((prj, i) => {
  const id = `ss-${i}`;
  const total = prj.images.length || 1;
  slideState[id] = { current: 0, total };

  const slidesHTML = total === 0
    ? `<div class="slide"><div style="color:rgba(255,255,255,0.2);font-size:0.75rem;font-family:var(--font-mono);">IMAGE</div></div>`
    : prj.images.map(src =>
        `<div class="slide"><img src="${src}" alt="${prj.title}" loading="lazy"></div>`
      ).join('');

  prjList.innerHTML += `
    <div class="prj-entry">
      <div class="col-prj">
        <div class="tl">■ &nbsp;${prj.year}</div>
        <div>${prj.title}, ${prj.type}</div>
        <div class="tr">
          <a href="#" onclick="openOverlay(${i});return false;">More &nbsp;→</a>
        </div>
      </div>
      <div style="margin-top:0.5rem;"></div>
      <div class="slideshow" id="${id}">
        <div class="slideshow-inner">${slidesHTML}</div>
        ${total > 1 ? `
        <div class="slide-nav">
          <button class="slide-btn" onclick="prevSlide('${id}')">‹</button>
          <button class="slide-btn" onclick="nextSlide('${id}')">›</button>
        </div>` : ''}
        <div class="slide-caption caption" id="${id}-cap">
          ${total > 1 ? `01 / ${String(total).padStart(2,'0')}` : ''}
        </div>
      </div>
    </div>
  `;
});

/* --- 슬라이드쇼 --- */
function updateSlide(id) {
  const ss = document.getElementById(id);
  const state = slideState[id];
  ss.querySelector('.slideshow-inner').style.transform = `translateX(-${state.current * 100}%)`;
  const cap = document.getElementById(id + '-cap');
  if (cap && state.total > 1)
    cap.textContent = `${String(state.current+1).padStart(2,'0')} / ${String(state.total).padStart(2,'0')}`;
}
function nextSlide(id) {
  slideState[id].current = (slideState[id].current + 1) % slideState[id].total;
  updateSlide(id);
}
function prevSlide(id) {
  slideState[id].current = (slideState[id].current - 1 + slideState[id].total) % slideState[id].total;
  updateSlide(id);
}

/* --- 오버레이 --- */
function openOverlay(i) {
  const prj = PROJECTS[i];
  document.getElementById('ov-title').textContent = `${prj.title}`;
  document.getElementById('ov-details').innerHTML = `${prj.type}<br>${prj.details}`;
  document.getElementById('ov-overview').textContent = prj.overview;

  const imgs = (prj.overlayImages && prj.overlayImages.length) ? prj.overlayImages : prj.images;
  const grid = document.getElementById('ov-grid');
  if (imgs.length) {
    grid.innerHTML = imgs.map((src, idx) =>
      `<div class="grid-item${idx===3?' wide':''}"><img src="${src}" alt="${prj.title}" loading="lazy"></div>`
    ).join('');
  } else {
    grid.innerHTML = `<div class="grid-item">img</div><div class="grid-item">img</div><div class="grid-item">img</div>`;
  }

  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeOverlay() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

/* --- 시계 --- */
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const p = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${p}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
