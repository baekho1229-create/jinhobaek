<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jinho Baek</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #147314;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
      --white-1: rgba(255,255,255,0.85);
      --white-2: rgba(255,255,255,0.75);
      --white-3: rgba(255,255,255,0.5);
      --white-4: rgba(255,255,255,0.15);
      --pad: 0.85rem;
      /* [9] nav/링크 hover transition 기준값 */
      --ease-out-expo: cubic-bezier(.22,1,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--white-2);
      min-height: 100vh;
    }

    /* [9] 링크 hover: opacity 0.75 + 미세 translateY */
    a { color: var(--white-2); text-decoration: none; transition: opacity 0.18s var(--ease-out-expo), transform 0.18s var(--ease-out-expo); }
    a:hover { opacity: 0.75; transform: translateY(-1px); }

    hr {
      border: none;
      border-top: 1px solid var(--white-4);
      margin: 0.75rem 0 1rem;
    }

    /* ── 타이포그래피 ── */
    h1 {
      font-weight: 800;
      font-size: clamp(3.2rem, 11vw, 5rem);
      line-height: 0.85;
      color: var(--white-1);
      letter-spacing: -0.045em;
    }
    h2 {
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      font-size: clamp(1rem, 2.5vw, 1.55rem);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .caption {
      font-size: 0.68rem;
      color: var(--white-3);
      font-family: var(--mono);
      line-height: 1.5;
      letter-spacing: 0.03em;
    }
    .label {
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--white-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    /* ── 그리드 유틸 ── */
    .g2   { display: grid; grid-template-columns: 1fr 1fr; gap: var(--pad); }
    .g3   { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--pad); }
    .g-prj { display: grid; grid-template-columns: 5rem 1fr 4.5rem; gap: 0.5rem; align-items: baseline; }
    .g-info { display: grid; grid-template-columns: 5fr 7fr; gap: 3rem; }
    .tl { text-align: left; }
    .tr { text-align: right; }
    .tc { text-align: center; }

    /* ── NAV (데스크탑) ── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: var(--pad);
      font-size: 0.95rem; font-weight: 600;
    }
    #nav-desktop {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 1rem;
    }
    #nav-subtitle {
      text-align: center; white-space: nowrap; opacity: 0.8;
      overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    #nav-right {
      display: flex; align-items: center;
      justify-content: flex-end; gap: 1.1rem;
      white-space: nowrap; flex-shrink: 0;
    }
    #nav-right a { white-space: nowrap; }

    /* [9] social-icon hover도 동일한 easing 적용 */
    .social-icon {
      display: inline-flex; opacity: 0.7;
      transition: opacity 0.18s var(--ease-out-expo), transform 0.18s var(--ease-out-expo);
    }
    .social-icon:hover { opacity: 1; transform: translateY(-1px); }

    /* 모바일 버튼 — 데스크탑에서 숨김 */
    #nav-mobile { display: none; }

    /* ── HEAD-ST 숨김 ── */
    #headst { display: none; }

    /* ── HERO ── */
    #head {
      padding: 7.5rem var(--pad) 4rem;
      display: flex; align-items: flex-end;
    }

    /* ── PRJ ── */
    #prj { padding: 0 var(--pad) 5rem; }
    .prj-entry { margin-bottom: 3.5rem; }
    .prj-meta  { margin-bottom: 0.5rem; font-size: 0.92rem; font-weight: 600; }
    .prj-year  { color: var(--white-3); font-family: var(--mono); font-size: 0.8rem; }
    .prj-more  { font-size: 0.85rem; }

    /* [5] More 텍스트 hover transition */
    .prj-more a {
      display: inline-flex; align-items: center;
      transition: opacity 0.18s var(--ease-out-expo), transform 0.22s var(--ease-out-expo);
    }
    /* [5] prj-entry hover 시 More 텍스트 translateX */
    .prj-entry:hover .prj-more a {
      transform: translateX(4px) translateY(0); /* translateY 상쇄 */
      opacity: 1;
    }

    /* [4][5] 프로젝트 썸네일 — 클릭 가능 + hover micro animation */
    .prj-thumb {
      width: 100%;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
      cursor: pointer; /* [4] 클릭 가능 표시 */
    }
    .prj-thumb img {
      width: 100%; height: auto;
      display: block;
      /* [5] hover scale transition */
      transition: transform 0.55s var(--ease-out-expo), opacity 0.35s var(--ease-out-expo);
      will-change: transform;
    }
    /* [5] 썸네일 hover: scale(1.015) + opacity 0.92 */
    .prj-entry:hover .prj-thumb img {
      transform: scale(1.015);
      opacity: 0.92;
    }

    /* ── INFO ── */
    #info {
      min-height: 100vh; padding: 5rem var(--pad) 6rem;
      font-size: 0.92rem; font-weight: 600;
    }
    .portrait {
      width: 100%; aspect-ratio: 3/4;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      color: var(--white-3); font-size: 0.65rem; font-family: var(--mono);
    }
    .portrait img { width: 100%; height: 100%; object-fit: cover; }

    /* ── FOOTER ── */
    #footsq { padding: var(--pad); font-size: 0.92rem; font-weight: 600; }
    #foot   { padding: var(--pad); font-size: 0.85rem; font-weight: 600; }
    .foot-grid {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 0.5rem;
    }
    .digital-clock { font-family: var(--mono); }

    /* ══════════════════════════════════════════
       오버레이 — 프로젝트 디테일 뷰
       (Title → Hero → HR → Description → HR → Process)
       ══════════════════════════════════════════ */

    /* [6] opacity + visibility 기반 fade — display 전환 제거 */
    #overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(0.8rem);
      align-items: flex-start; justify-content: center;
      overflow-y: auto; padding: 0;
      /* [6] 기본: 숨김 */
      display: flex;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.3s var(--ease-out-expo),
                  visibility 0.3s var(--ease-out-expo);
    }
    /* [6] active: 보임 */
    #overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* [1] 데스크탑: 패널 폭 min(92vw, 1440px) */
    #overlay-panel {
      width: min(92vw, 1440px);
      min-height: 100vh;
      background: #0d0d0d;
      display: flex; flex-direction: column;
      /* [6] panel slide-up transition */
      transform: translateY(16px);
      transition: transform 0.38s var(--ease-out-expo);
    }
    #overlay.active #overlay-panel {
      transform: translateY(0);
    }

    /* ── 헤더 (sticky) ── */
    #ov-header {
      position: sticky; top: 0; z-index: 10;
      background: #0d0d0d;
      padding: 0.85rem 1.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.88rem; font-weight: 600;
      color: var(--white-3); flex-shrink: 0;
    }
    #ov-close-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 0.4rem; min-width: 44px; min-height: 44px;
      padding: 0 0.85rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 3px; color: var(--white-2);
      font-size: 0.78rem; font-family: var(--font); font-weight: 600;
      cursor: pointer; letter-spacing: 0.04em;
      transition: background 0.15s;
    }
    #ov-close-btn:hover { background: rgba(255,255,255,0.12); }

    /* ── 본문 스크롤 영역 ── */
    #ov-scroll {
      flex: 1;
      display: flex; flex-direction: column;
    }

    /* [1] 텍스트 영역 내부 너비 제한 래퍼 */
    .ov-content-wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.6rem;
    }

    /* [7] 프로젝트 제목 reveal 애니메이션 */
    #ov-project-title {
      text-align: center;
      padding: 3rem 1.6rem 2rem;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: var(--white-1);
      letter-spacing: -0.04em;
      line-height: 1;
      /* [7] reveal 초기 상태 */
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.45s var(--ease-out-expo),
                  transform 0.45s var(--ease-out-expo);
    }
    #ov-project-title.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* [2] 히어로 이미지 영역 — 풀 너비 + 최대 높이 */
    #ov-hero {
      width: 100%;
      padding: 0; /* [1] 이미지는 전체 너비 사용 */
    }
    /* [7] 히어로 영역 reveal */
    #ov-hero {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s var(--ease-out-expo) 0.08s,
                  transform 0.5s var(--ease-out-expo) 0.08s;
    }
    #ov-hero.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* [2] 단일 히어로 이미지 */
    #ov-hero > img {
      width: 100%;
      max-height: 78vh;
      object-fit: contain;
      display: block;
    }

    /* ── 히어로 슬라이드쇼 ── */
    #ov-hero-slideshow {
      position: relative; overflow: hidden;
    }
    #ov-hero-slideshow .ov-slide-inner {
      display: flex; transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    #ov-hero-slideshow .ov-slide { min-width: 100%; }
    /* [2] 슬라이드 이미지 최대 높이 */
    #ov-hero-slideshow .ov-slide img {
      width: 100%;
      max-height: 78vh;
      object-fit: contain;
      display: block;
    }

    /* [3] 슬라이드 버튼 44px */
    .ov-slide-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 100%; padding: 0 12px;
      display: flex; justify-content: space-between;
      pointer-events: none;
    }
    .ov-slide-nav button {
      pointer-events: all;
      /* [3] 44px × 44px */
      width: 44px; height: 44px;
      border-radius: 50%; border: none;
      background: rgba(200,200,200,0.35); cursor: pointer;
      font-size: 16px; color: #000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    .ov-slide-nav button:hover { opacity: 0.7; background: rgba(220,220,220,0.5); }

    /* [8] 슬라이드 카운터 */
    #ov-hero-counter {
      text-align: right;
      padding: 0.4rem 1.6rem 0;
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--white-3);
      letter-spacing: 0.06em;
    }

    /* ── HR 구분선 ── */
    .ov-hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      margin: 2rem 0;
    }

    /* ── Description 섹션 ── */
    #ov-description { width: 100%; }
    .ov-section-heading {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--white-1);
      letter-spacing: -0.02em;
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .ov-section-heading::after {
      content: "↓";
      font-size: 0.7em;
      opacity: 0.4;
      font-weight: 400;
    }
    .ov-desc-text {
      font-size: 0.92rem; color: var(--white-2); line-height: 1.8;
      margin-bottom: 1.6rem;
    }
    .ov-meta-caption {
      font-size: 0.72rem; font-family: var(--mono);
      color: var(--white-3); line-height: 1.7;
      letter-spacing: 0.02em;
    }
    .ov-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.8rem 1.2rem; margin-bottom: 1.2rem;
    }
    .ov-meta-val { font-size: 0.85rem; color: var(--white-2); line-height: 1.5; }
    .tools-list  { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
    .tool-tag {
      font-size: 0.6rem; font-family: var(--mono);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--white-3); padding: 0.15rem 0.4rem; border-radius: 2px;
    }

    /* ── Process 섹션 ── */
    #ov-process { width: 100%; }
    .ov-process-text {
      font-size: 0.92rem; color: var(--white-2);
      line-height: 1.8; margin-bottom: 1.6rem;
    }
    /* [1] Process 이미지: 풀 너비 */
    .ov-process-img { margin-bottom: 1.6rem; width: 100%; }
    .ov-process-img img { width: 100%; height: auto; display: block; }
    .ov-process-img-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.6rem; margin-bottom: 1.6rem; width: 100%;
    }
    .ov-process-img-grid img { width: 100%; height: auto; display: block; }
    .ov-cap {
      margin-top: 0.4rem;
      font-size: 0.65rem; font-family: var(--mono);
      color: var(--white-3); line-height: 1.5;
    }

    /* ── 이미지 placeholder ── */
    .ov-img-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.15);
      font-size: 0.65rem; font-family: var(--mono); letter-spacing: 0.1em;
    }

    /* ── 모바일 드로어 ── */
    #mobile-menu {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: var(--bg);
      flex-direction: column; padding: var(--pad);
    }
    #mobile-menu.open { display: flex; }
    .mob-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 3rem; font-size: 0.92rem; font-weight: 600;
    }
    .mob-close-btn {
      background: none; border: none; cursor: pointer;
      color: var(--white-2); font-size: 0.92rem;
      font-family: var(--font); font-weight: 600; padding: 0;
    }
    .mob-links {
      display: flex; flex-direction: column; gap: 0.1rem;
      flex: 1;
    }
    .mob-links a {
      font-size: clamp(2rem, 10vw, 3rem);
      font-weight: 800; letter-spacing: -0.03em;
      color: var(--white-1); line-height: 1.1;
      border-bottom: 1px solid var(--white-4);
      padding: 0.6rem 0;
    }
    .mob-links a:hover { opacity: 0.75; }
    .mob-bottom {
      margin-top: 2rem;
      display: flex; align-items: center;
      justify-content: space-between;
      font-size: 0.8rem; color: var(--white-3);
    }
    .mob-sns { display: flex; gap: 1rem; align-items: center; }

    /* ════════════════════════
       모바일 반응형 (680px 이하)
       ════════════════════════ */
    @media (max-width: 680px) {

      /* NAV */
      #nav-desktop { display: none; }
      #nav-mobile  {
        display: flex; justify-content: space-between; align-items: center;
        font-size: 0.92rem; font-weight: 600;
      }
      #mob-open-btn {
        background: none; border: none; cursor: pointer;
        color: var(--white-2); font-size: 0.92rem;
        font-family: var(--font); font-weight: 600; padding: 0;
      }

      /* HERO */
      #head { padding: 5.5rem var(--pad) 2.5rem; }
      h1 { font-size: clamp(2.8rem, 14vw, 3.8rem); }

      /* PRJ */
      #prj { padding: 0 var(--pad) 3rem; }
      .prj-entry { margin-bottom: 2.5rem; }
      /* [11] 모바일 More 터치 영역 44px 유지 */
      .prj-more a {
        display: inline-flex; align-items: center;
        min-height: 44px; padding: 0 0.25rem;
      }
      .g-prj {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        row-gap: 0.25rem;
      }
      .prj-year  { grid-column: 1; grid-row: 1; align-self: center; }
      .prj-more  { grid-column: 2; grid-row: 1; text-align: right; align-self: center; }
      .prj-title { grid-column: 1 / -1; grid-row: 2; font-size: 0.88rem; color: var(--white-2); }
      .prj-thumb { width: 100%; }

      /* [2] 모바일: 히어로 이미지 max-height 조정 */
      #ov-hero > img,
      #ov-hero-slideshow .ov-slide img {
        max-height: 55vw;
      }

      /* INFO */
      #info { padding: 3.5rem var(--pad) 4rem; }
      .g-info { grid-template-columns: 1fr; gap: 1.5rem; }
      .portrait { aspect-ratio: 4/3; }
      h2 { font-size: 1rem; }
      .g3 { grid-template-columns: 1fr; gap: 2rem; }

      /* FOOTER */
      .foot-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        row-gap: 0.2rem;
      }
      .foot-copy  { grid-column: 1 / -1; grid-row: 1; font-size: 0.75rem; }
      .foot-clock { grid-column: 1; grid-row: 2; }
      .foot-name  { grid-column: 2; grid-row: 2; text-align: right; }

      /* [11] 모바일 오버레이 */
      #overlay-panel { width: 100%; }
      #ov-project-title { font-size: clamp(1.8rem, 9vw, 2.5rem); padding: 2rem 1rem 1.5rem; }
      #ov-hero-counter { padding: 0.35rem 1rem 0; }
      .ov-hr { margin: 1.5rem 0; }
      .ov-content-wrap { padding: 0 1rem; }
      #ov-description, #ov-process { padding-bottom: 2rem; }
      .ov-process-img-grid { grid-template-columns: 1fr; }
      .ov-meta-grid { grid-template-columns: 1fr 1fr; }
      #ov-close-btn { min-width: 64px; min-height: 44px; }
    }

    /* ════════════════════════
       [10] prefers-reduced-motion
       ════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      /* 오버레이 reveal도 즉시 표시 */
      #ov-project-title,
      #ov-hero {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
      #overlay-panel {
        transform: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>

<script src="projects.js"></script>

let _ovHeroImgs = [];

/* [8] 카운터 업데이트 헬퍼 */
function _updateOvCounter() {
  const el = document.getElementById('ov-hero-counter');
  if (!el) return;
  if (_ovHeroImgs.length > 1) {
    el.style.display = '';
    const n = String(_ovHeroIdx + 1).padStart(2, '0');
    const t = String(_ovHeroImgs.length).padStart(2, '0');
    el.textContent = `${n} / ${t}`;
  } else {
    el.style.display = 'none';
  }
}

function openOverlay(i, triggerEl) {
  _ovTrigger = triggerEl || document.activeElement;
  const prj = PROJECTS[i];

  /* ── 헤더 제목 (small) ── */
  document.getElementById('ov-title').textContent = prj.title;

  /* ── [7] 제목 reveal 초기화 ── */

  titleEl.classList.remove('revealed');
  titleEl.textContent = prj.title;

  /* ── [7] 히어로 reveal 초기화 ── */
  const heroEl = document.getElementById('ov-hero');
  heroEl.classList.remove('revealed');

  /* ── 히어로 이미지 렌더 ── */
  _ovHeroImgs = prj.images || [];
  _ovHeroIdx  = 0;
  if (_ovHeroImgs.length === 0) {
    heroEl.innerHTML = '<div class="ov-img-placeholder">[ hero image ]</div>';
  } else if (_ovHeroImgs.length === 1) {
    heroEl.innerHTML = `<img src="${_ovHeroImgs[0]}" alt="${prj.title}" loading="lazy">`;
  } else {
    const slides = _ovHeroImgs.map(src =>
      `<div class="ov-slide"><img src="${src}" alt="${prj.title}" loading="lazy"></div>`
    ).join('');
    heroEl.innerHTML = `
      <div id="ov-hero-slideshow">
        <div class="ov-slide-inner" id="ov-hero-inner">${slides}</div>
        <!-- [3] 슬라이드 버튼 44px + aria-label -->
        <div class="ov-slide-nav">
          <button onclick="ovHeroPrev()" aria-label="Previous slide">‹</button>
          <button onclick="ovHeroNext()" aria-label="Next slide">›</button>
        </div>
      </div>`;
  }
  /* [8] 카운터 초기 렌더 */
  _updateOvCounter();

  /* ── 4. Description ── */
  // 개요
  document.getElementById('ov-overview').innerHTML =
    (prj.overview || '').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

  // 메타 캡션 (연도 · 타입 · 툴 — 레퍼런스의 .caption 스타일)
  const d = prj.details || {};
  document.getElementById('ov-meta-caption').innerHTML =
    `${d.year || prj.year || ''}${d.medium ? '<br>' + d.medium : ''}`;

  // 메타 그리드
  document.getElementById('ov-meta').innerHTML = [
    ['Year',    d.year    || prj.year || '—'],
    ['Medium',  d.medium  || '—'],
    ['Size',    d.size    || '—'],
    ['Edition', d.edition || '—'],
  ].map(([k,v]) => `
    <div>
      <div class="label">${k}</div>
      <div class="ov-meta-val">${v}</div>
    </div>`).join('');

  // 툴
  document.getElementById('ov-tools').innerHTML =
    (prj.tools || []).map(t => `<span class="tool-tag">${t}</span>`).join('');

  /* ── 6. Process ── */
  const pc = document.getElementById('ov-process-content');
  const steps = prj.process || [];

  if (steps.length === 0) {
    pc.innerHTML = '<div class="ov-process-text" style="opacity:0.4;">No process notes added yet.</div>';
  } else {
    pc.innerHTML = steps.map(step => {
      if (step.type === 'text') {
        /* [1] 텍스트는 content-wrap으로 너비 제한 */
        return `<div class="ov-content-wrap"><div class="ov-process-text">${step.content.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}</div></div>`;
      }
      if (step.type === 'image') {
        /* [1] 이미지는 풀 너비 */
        const imgTag = step.src
          ? `<img src="${step.src}" alt="${step.caption || ''}" loading="lazy">`
          : '<div class="ov-img-placeholder">[ image ]</div>';
        return `<div class="ov-process-img">
          ${imgTag}
          ${step.caption ? `<div class="ov-content-wrap"><div class="ov-cap">${step.caption}</div></div>` : ''}
        </div>`;
      }
      if (step.type === 'images') {
        /* [1] 이미지 그리드도 풀 너비 */
        const imgs = (step.srcs && step.srcs.length)
          ? step.srcs.map(s => `<img src="${s}" alt="" loading="lazy">`).join('')
          : '<div class="ov-img-placeholder" style="grid-column:1/-1;">[ images ]</div>';
        return `<div class="ov-process-img-grid">
          ${imgs}
        </div>
        ${step.caption ? `<div class="ov-content-wrap"><div class="ov-cap" style="margin-top:-1rem;margin-bottom:1.6rem;">${step.caption}</div></div>` : ''}`;
      }
      return '';
    }).join('');
  }

  /* ── [6] 오버레이 열기 (opacity/visibility 방식) ── */
  const overlay = document.getElementById('overlay');
  overlay.scrollTop = 0;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  /* [7] 패널 transition 완료 후 reveal 트리거 */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      titleEl.classList.add('revealed');
      heroEl.classList.add('revealed');
      document.getElementById('ov-close-btn')?.focus();
    });
  });
}

/* 히어로 슬라이드 컨트롤 */
function ovHeroNext() {
  _ovHeroIdx = (_ovHeroIdx + 1) % _ovHeroImgs.length;
  document.getElementById('ov-hero-inner').style.transform = `translateX(-${_ovHeroIdx * 100}%)`;
  _updateOvCounter(); /* [8] 카운터 업데이트 */
}
function ovHeroPrev() {
  _ovHeroIdx = (_ovHeroIdx - 1 + _ovHeroImgs.length) % _ovHeroImgs.length;
  document.getElementById('ov-hero-inner').style.transform = `translateX(-${_ovHeroIdx * 100}%)`;
  _updateOvCounter(); /* [8] 카운터 업데이트 */
}

function closeOverlay() {
  /* [6] reveal 클래스 제거 (다음 오픈을 위해) */
  document.getElementById('ov-project-title')?.classList.remove('revealed');
  document.getElementById('ov-hero')?.classList.remove('revealed');
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
  /* 닫힐 때 원래 More 버튼으로 focus 복귀 */
  if (_ovTrigger) {
    setTimeout(() => { _ovTrigger?.focus(); _ovTrigger = null; }, 50);
  }
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

/* --- 모바일 메뉴 --- */
function openMobMenu() {
  document.getElementById('mobile-menu').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.body.style.overflow = '';
}
window.addEventListener('resize', () => {
  if (window.innerWidth > 680) closeMobMenu();
});

/* --- 시계 --- */
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const p = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${p}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
